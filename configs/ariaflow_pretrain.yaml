model:
  era5_channels: 72              # 30 ERA5_t + 6 CAMS_t + 30 ERA5_prev + 6 CAMS_prev
  global_img_size: [168, 280]
  global_patch_size: 8
  global_embed_dim: 768
  global_depth: 8
  global_num_heads: 12
  local_proxy_channels: 18       # CAMS_t(6) + CAMS_prev(6) + elev(1) + roads(1) + lights(1) + pop(1) + lat(1) + lon(1)
  local_img_size: [512, 512]
  local_patch_size: 16
  local_embed_dim: 512
  local_depth: 6
  local_num_heads: 8
  cross_num_heads: 8
  cross_layers: 2
  out_channels: 1
  mlp_ratio: 4.0
  drop_rate: 0.1
  drop_path: 0.1
  global_region_h: 7
  global_region_w: 7
  time_freq_dim: 256             # sinusoidal embedding dimension for flow time t

data:
  mode: global
  era5_dir: /scratch/project_462001140/ammar/eccv/aria/data/pretrain/era5
  ghap_dir: /scratch/project_462001140/ammar/eccv/aria/data/pretrain/ghap
  elev_coarse_path: /scratch/project_462001140/ammar/eccv/aria/data/pretrain/elevation/elevation_global_025deg.zarr
  elev_hires_path: /scratch/project_462001140/ammar/eccv/aria/data/pretrain/elevation/gmted2010_global.zarr
  cams_dir: /scratch/project_462001140/ammar/eccv/aria/data/pretrain/cams
  emission_proxies_path: /scratch/project_462001140/ammar/eccv/aria/data/pretrain/emission_proxies.zarr
  train_years: [2017, 2018, 2019, 2020, 2021, 2022]
  val_years: [2022]
  test_years: [2022]
  horizons: [0, 1]
  patch_size: 512
  normalize: true
  num_workers: 4
  ghap_h: 18000
  ghap_w: 36000
  lat_north: 90.0
  lon_west: -180.0
  ghap_res: 0.01
  era5_res: 0.25
  era5_h: 721
  era5_w: 1440
  ghap_mean: 2.416
  ghap_std: 0.800
  ghap_log_transform: true
  augment: true
  hotspot_ratio: 0.7
  hotspot_power: 1.5
  patches_per_day: 32

train:
  batch_size: 2
  val_batch_size: 2
  learning_rate: 5.0e-5
  warmup_steps: 10000            # linear warmup over 10k steps (~4-5 epochs)
  weight_decay: 0.05
  min_lr: 1.0e-6
  epochs: 300
  ema_decay: 0.9999              # EMA for validation + inference
  steps_per_epoch: 2200          # approx patches/epoch / (batch * gpus)
  gradient_clip_val: 1.0
  precision: "bf16-mixed"
  accumulate_grad_batches: 1
  log_every_n_steps: 10
  check_val_every_n_epoch: 1
  save_top_k: 3
