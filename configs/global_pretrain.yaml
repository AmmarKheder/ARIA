model:
  era5_channels: 72          # 30 ERA5_t + 6 CAMS_t + 30 ERA5_prev + 6 CAMS_prev
  global_img_size: [168, 280] # cropped ERA5 window around tile (same as Europe)
  global_patch_size: 8
  global_embed_dim: 768
  global_depth: 8
  global_num_heads: 12
  local_channels: 18          # CAMS_t(6) + CAMS_prev(6) + elev(1) + roads(1) + lights(1) + pop(1) + lat(1) + lon(1)
  local_img_size: [512, 512]
  local_patch_size: 16
  local_embed_dim: 512
  local_depth: 6
  local_num_heads: 8
  cross_num_heads: 8
  cross_layers: 2
  decoder_depth: 2
  out_channels: 1
  mlp_ratio: 4.0
  drop_rate: 0.1
  drop_path: 0.1
  global_region_h: 7
  global_region_w: 7

data:
  mode: global
  era5_dir: /scratch/project_462001140/ammar/eccv/aria/data/era5
  ghap_dir: /scratch/project_462001140/ammar/eccv/aria/data/ghap
  elev_coarse_path: /scratch/project_462001140/ammar/eccv/aria/data/elevation/elevation_global_025deg.zarr
  elev_hires_path: /scratch/project_462001140/ammar/eccv/aria/data/elevation/gmted2010_global.zarr
  cams_dir: /scratch/project_462001140/ammar/eccv/aria/data/cams
  emission_proxies_path: /scratch/project_462001140/ammar/eccv/aria/data/emission_proxies.zarr
  # GHAP data: 2018-2022 (2017 will be added once disk space freed)
  train_years: [2018, 2019, 2020, 2021, 2022]
  val_years: [2022]
  test_years: [2022]
  horizons: [0, 1]   # J+0 = same-day downscaling, J+1 = 24h forecast
  patch_size: 512
  normalize: true
  num_workers: 4
  # Global GHAP dimensions
  ghap_h: 18000
  ghap_w: 36000
  # Global domain
  lat_north: 90.0
  lon_west: -180.0
  ghap_res: 0.01
  era5_res: 0.25
  # Era5 global shape
  era5_h: 721
  era5_w: 1440
  # Log-space normalization stats (log1p(PM2.5) normalized)
  # ghap_to_lognorm(x) = (log1p(x) - 2.416) / 0.800
  # land_threshold = -2.416/0.800 = -3.02 → PM2.5 > 0 correctly
  ghap_mean: 2.416
  ghap_std: 0.800
  ghap_log_transform: true  # use expm1 inverse in RMSE computation
  augment: true
  hotspot_ratio: 0.7   # 70% of patches sampled from high-pollution areas
  hotspot_power: 1.5   # stronger bias toward extreme events
  patches_per_day: 32  # random patches per (day, horizon) → 6×365×32 ≈ 70,080 samples/epoch

train:
  batch_size: 2
  val_batch_size: 2
  learning_rate: 5.0e-5
  warmup_epochs: 5
  weight_decay: 0.05
  min_lr: 1.0e-6
  epochs: 300
  # Loss weights
  alpha_mse: 1.0
  alpha_ssim: 0.0
  alpha_grad: 0.0
  alpha_spectral: 0.1       # Focal Frequency Loss — penalizes spatial errors
  underestimate_penalty: 1.5  # penalise under-prediction (health risk asymmetry)
  ffl_alpha: 1.0
  gradient_clip_val: 1.0
  early_stopping_patience: 100
  precision: "bf16-mixed"
  accumulate_grad_batches: 1
  log_every_n_steps: 10
  check_val_every_n_epoch: 1
  save_top_k: 3
