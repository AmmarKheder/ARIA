model:
  era5_channels: 72          # 30 ERA5_t + 6 CAMS_t + 30 ERA5_prev + 6 CAMS_prev
  global_img_size: [168, 280] # cropped ERA5 window around tile (same as Europe)
  global_patch_size: 8
  global_embed_dim: 768
  global_depth: 8
  global_num_heads: 12
  local_channels: 18          # CAMS_t(6) + CAMS_prev(6) + elev(1) + roads(1) + lights(1) + pop(1) + lat(1) + lon(1)
  local_img_size: [512, 512]
  local_patch_size: 16
  local_embed_dim: 512
  local_depth: 6
  local_num_heads: 8
  cross_num_heads: 8
  cross_layers: 2
  decoder_depth: 2
  out_channels: 1
  mlp_ratio: 4.0
  drop_rate: 0.1
  drop_path: 0.1
  global_region_h: 7
  global_region_w: 7

data:
  mode: global
  era5_dir: /scratch/project_462001140/ammar/eccv/data/zarr/era5_global_daily
  ghap_dir: /scratch/project_462001140/ammar/eccv/data/zarr/ghap_global_daily
  elev_coarse_path: /scratch/project_462001140/ammar/eccv/data/zarr/elevation/elevation_global_025deg.zarr
  elev_hires_path: /scratch/project_462001140/ammar/eccv/data/zarr/elevation/gmted2010_global.zarr
  cams_dir: /scratch/project_462001140/ammar/eccv/data/zarr/cams_global_daily
  emission_proxies_path: /scratch/project_462001140/ammar/eccv/data/zarr/emission_proxies_global.zarr
  train_years: [2018, 2019, 2020]
  val_years: [2021]
  test_years: [2022]
  horizons: [1, 2, 3, 4]
  patch_size: 512
  normalize: true
  num_workers: 4
  # Global GHAP dimensions
  ghap_h: 18000
  ghap_w: 36000
  # Global domain
  lat_north: 90.0
  lon_west: -180.0
  ghap_res: 0.01
  era5_res: 0.25
  # Era5 global shape
  era5_h: 721
  era5_w: 1440
  # Normalization
  ghap_mean: 12.0
  ghap_std: 18.0
  augment: true
  hotspot_ratio: 0.5
  hotspot_power: 1.0

train:
  batch_size: 2
  val_batch_size: 2
  learning_rate: 5.0e-5
  warmup_epochs: 0
  weight_decay: 0.05
  min_lr: 1.0e-6
  epochs: 300
  alpha_mse: 1.0
  alpha_ssim: 0.0
  alpha_grad: 0.0
  alpha_spectral: 0.1
  alpha_station: 0.0
  underestimate_penalty: 1.0
  gradient_clip_val: 1.0
  early_stopping_patience: 100
  precision: "bf16-mixed"
  accumulate_grad_batches: 1
  log_every_n_steps: 10
  check_val_every_n_epoch: 1
  save_top_k: 3
